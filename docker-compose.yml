services:
  backend-fastapi:
    build:
      context: .
      dockerfile: backend_fastapi/Dockerfile
    environment:
      FASTAPI_PORT: "8000"
      FASTAPI_DATABASE_URL: sqlite:////data/collaborative-editor-ai.sqlite
      REALTIME_WS_BASE_URL: ws://localhost:3001/ws
      REALTIME_SHARED_SECRET: ${REALTIME_SHARED_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      AI_STREAM_PROVIDER: stub
    ports:
      - "8000:8000"
    volumes:
      - app_data:/data

  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    environment:
      REALTIME_PORT: "3001"
      DATABASE_PATH: /data/collaborative-editor-ai.sqlite
      REALTIME_SHARED_SECRET: ${REALTIME_SHARED_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - app_data:/data
    depends_on:
      - backend-fastapi

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend-fastapi
      - realtime

volumes:
  app_data:
