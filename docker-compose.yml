services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/collaborative-editor-ai.sqlite
      REALTIME_WS_BASE_URL: ws://localhost:3001/ws
      REALTIME_SHARED_SECRET: collaborative-editor-ai-dev-secret
      AI_PROVIDER: stub
      ALLOW_DEBUG_USER_HEADER: "true"
    ports:
      - "3000:3000"
    volumes:
      - app_data:/data

  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    environment:
      REALTIME_PORT: "3001"
      DATABASE_PATH: /data/collaborative-editor-ai.sqlite
      REALTIME_SHARED_SECRET: collaborative-editor-ai-dev-secret
    ports:
      - "3001:3001"
    volumes:
      - app_data:/data
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - realtime

volumes:
  app_data:
