openapi: 3.0.3
info:
  title: Collaborative Editor AI Backend API
  version: 1.0.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
    LoginRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        displayName:
          type: string
    LoginResponse:
      type: object
      required: [userId, displayName, globalRole, accessToken, expiresIn]
      properties:
        userId:
          type: string
        displayName:
          type: string
        globalRole:
          type: string
          enum: [user, admin]
        accessToken:
          type: string
        expiresIn:
          type: integer
    CreateDocumentRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string
    CreateDocumentResponse:
      type: object
      required: [documentId, title, ownerId, createdAt, updatedAt, currentVersionId]
      properties:
        documentId:
          type: string
        title:
          type: string
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        currentVersionId:
          type: string
    GetDocumentResponse:
      type: object
      required: [documentId, title, content, updatedAt, currentVersionId, role, revisionId]
      properties:
        documentId:
          type: string
        title:
          type: string
        content:
          type: string
        updatedAt:
          type: string
          format: date-time
        currentVersionId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        revisionId:
          type: string
    UpdateContentRequest:
      type: object
      required: [requestId, content, baseRevisionId]
      properties:
        requestId:
          type: string
        content:
          type: string
        baseRevisionId:
          type: string
    UpdateContentResponse:
      type: object
      required: [documentId, updatedAt, revisionId]
      properties:
        documentId:
          type: string
        updatedAt:
          type: string
          format: date-time
        revisionId:
          type: string
    VersionSummary:
      type: object
      required: [versionId, versionNumber, createdAt, createdBy, reason]
      properties:
        versionId:
          type: string
        versionNumber:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        reason:
          type: string
    VersionListResponse:
      type: object
      required: [documentId, versions]
      properties:
        documentId:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/VersionSummary'
        nextCursor:
          type: string
          nullable: true
    RevertRequest:
      type: object
      required: [requestId, targetVersionId]
      properties:
        requestId:
          type: string
        targetVersionId:
          type: string
    RevertResponse:
      type: object
      required: [documentId, currentVersionId, revertedFromVersionId, updatedAt]
      properties:
        documentId:
          type: string
        currentVersionId:
          type: string
        revertedFromVersionId:
          type: string
        updatedAt:
          type: string
          format: date-time
    PermissionMember:
      type: object
      required: [userId, role, updatedAt]
      properties:
        userId:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        updatedAt:
          type: string
          format: date-time
    ListPermissionsResponse:
      type: object
      required: [documentId, members]
      properties:
        documentId:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/PermissionMember'
    UpdatePermissionRequest:
      type: object
      required: [requestId, targetUserId, role]
      properties:
        requestId:
          type: string
        targetUserId:
          type: string
        role:
          type: string
          enum: [viewer, editor]
    UpdatePermissionResponse:
      type: object
      required: [documentId, targetUserId, role, updatedAt]
      properties:
        documentId:
          type: string
        targetUserId:
          type: string
        role:
          type: string
          enum: [viewer, editor]
        updatedAt:
          type: string
          format: date-time
    RevokePermissionResponse:
      type: object
      required: [documentId, targetUserId, revoked]
      properties:
        documentId:
          type: string
        targetUserId:
          type: string
        revoked:
          type: boolean
    AiPolicyResponse:
      type: object
      required: [documentId, aiEnabled, allowedRolesForAI, dailyQuota, updatedAt]
      properties:
        documentId:
          type: string
        aiEnabled:
          type: boolean
        allowedRolesForAI:
          type: array
          items:
            type: string
            enum: [owner, editor, viewer]
        dailyQuota:
          type: integer
        updatedAt:
          type: string
          format: date-time
    UpdateAiPolicyRequest:
      type: object
      required: [aiEnabled, allowedRolesForAI, dailyQuota]
      properties:
        aiEnabled:
          type: boolean
        allowedRolesForAI:
          type: array
          items:
            type: string
            enum: [owner, editor, viewer]
        dailyQuota:
          type: integer
    TextSelection:
      type: object
      required: [start, end]
      properties:
        start:
          type: integer
        end:
          type: integer
    RewriteAiJobRequest:
      type: object
      required: [documentId, selection, selectedText, instruction, baseVersionId, requestId]
      properties:
        documentId:
          type: string
        selection:
          $ref: '#/components/schemas/TextSelection'
        selectedText:
          type: string
        contextBefore:
          type: string
        contextAfter:
          type: string
        instruction:
          type: string
        baseVersionId:
          type: string
        requestId:
          type: string
    SummarizeAiJobRequest:
      type: object
      required: [documentId, selection, selectedText, baseVersionId, requestId]
      properties:
        documentId:
          type: string
        selection:
          $ref: '#/components/schemas/TextSelection'
        selectedText:
          type: string
        contextBefore:
          type: string
        contextAfter:
          type: string
        baseVersionId:
          type: string
        requestId:
          type: string
    TranslateAiJobRequest:
      type: object
      required: [documentId, selection, selectedText, targetLanguage, baseVersionId, requestId]
      properties:
        documentId:
          type: string
        selection:
          $ref: '#/components/schemas/TextSelection'
        selectedText:
          type: string
        contextBefore:
          type: string
        contextAfter:
          type: string
        targetLanguage:
          type: string
        baseVersionId:
          type: string
        requestId:
          type: string
    AiJobResponse:
      type: object
      required: [jobId, statusUrl, status]
      properties:
        jobId:
          type: string
        statusUrl:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED]
        proposedText:
          type: string
        errorCode:
          type: string
        errorMessage:
          type: string
        baseVersionId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SessionRequest:
      type: object
      required: [documentId]
      properties:
        documentId:
          type: string
    SessionResponse:
      type: object
      required: [sessionId, wsUrl, role]
      properties:
        sessionId:
          type: string
        wsUrl:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
    CreateExportRequest:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [txt, json, pdf, docx]
        requestId:
          type: string
    ReadyExportResponse:
      type: object
      required: [downloadUrl, expiresAt, content, contentType, fileName]
      properties:
        downloadUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        content:
          type: string
        contentType:
          type: string
        fileName:
          type: string
    ExportQueuedResponse:
      type: object
      required: [jobId, statusUrl]
      properties:
        jobId:
          type: string
        statusUrl:
          type: string
    ExportStatusResponse:
      type: object
      required: [jobId, status, downloadUrl, expiresAt]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCEEDED, FAILED]
        downloadUrl:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        errorCode:
          type: string
        errorMessage:
          type: string
security:
  - BearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        '200':
          description: Health check response
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid login payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Created document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDocumentResponse'
        '401':
          description: Missing or invalid auth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}:
    get:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocumentResponse'
        '404':
          description: Missing document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/content:
    put:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContentRequest'
      responses:
        '200':
          description: Saved document content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateContentResponse'
        '403':
          description: Write access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Stale revision conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/versions:
    get:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionListResponse'
  /documents/{documentId}/revert:
    post:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevertRequest'
      responses:
        '200':
          description: Revert completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevertResponse'
  /documents/{documentId}/permissions:
    get:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document members and roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPermissionsResponse'
    put:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Updated permission entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePermissionResponse'
  /documents/{documentId}/permissions/{targetUserId}:
    delete:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
        - in: path
          name: targetUserId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Revoked permission entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokePermissionResponse'
  /documents/{documentId}/ai-policy:
    get:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current AI policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPolicyResponse'
    put:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAiPolicyRequest'
      responses:
        '200':
          description: Updated AI policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPolicyResponse'
  /sessions:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
      responses:
        '200':
          description: Realtime session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
  /ai/rewrite:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewriteAiJobRequest'
      responses:
        '202':
          description: Rewrite job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJobResponse'
  /ai/summarize:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeAiJobRequest'
      responses:
        '202':
          description: Summarize job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJobResponse'
  /ai/translate:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateAiJobRequest'
      responses:
        '202':
          description: Translate job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJobResponse'
  /ai/jobs/{jobId}:
    get:
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current AI job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJobResponse'
  /documents/{documentId}/export:
    post:
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '200':
          description: Immediate export response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyExportResponse'
        '202':
          description: Queued export response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportQueuedResponse'
  /exports/{jobId}:
    get:
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Export job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStatusResponse'
  /exports/{jobId}/download:
    get:
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Export file download
          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                type: string
